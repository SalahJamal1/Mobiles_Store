name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    backend:
        name: NestJS Backend CI
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: mobile_db
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping -h localhost -proot"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: server/package-lock.json

            - name: Install Dependencies
              working-directory: server
              run: npm ci

            - name: Lint
              working-directory: server
              run: npm run lint

            - name: Run Tests
              working-directory: server
              run: npm run test

            - name: Build NestJS
              working-directory: server
              run: npm run build

            - name: Archive Build (optional)
              uses: actions/upload-artifact@v4
              with:
                  name: nestjs-build
                  path: server/dist

    mobile:
        name: React Native CI
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: mobile/package-lock.json

            - name: Install Dependencies
              working-directory: mobile
              run: npm ci

            - name: Lint
              working-directory: mobile
              run: npm run lint || true

            - name: Type Check
              working-directory: mobile
              run: npx tsc --noEmit || true

            - name: Build Check (Expo / RN)
              working-directory: mobile
              run: npm run build || echo "no build script"
